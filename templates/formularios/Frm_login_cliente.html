<!-- llamar a layout -->
{% extends "layout.html" %}

{% block title %} Login Cliente {% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center vh-100">
    <div id="formulario_login_empleado" class="custom-form-box">
        <h5 class="text-center mb-4">Login Cliente</h5>
        <form action="{{ url_for('login_cliente') }}" method="post">
    <input type="text" name="usuario" placeholder="Nombre de usuario" required>
    <input type="password" name="clave" placeholder="Contraseña" required>
    <div class="text-center">
        <button type="submit" class="btn custom-btn mb-3">Ingresar</button>
        <br>
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Volver</a>
    </div>
        </form>
    </div>
</div>
{% endblock %}
