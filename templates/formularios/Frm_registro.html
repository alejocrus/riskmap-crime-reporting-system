<!-- llamar a layout -->
{% extends "layout.html" %}

{% block title %} Registro {% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center vh-100">
    <div id="formulario_registro_usuario" class="custom-form-box p-4 shadow rounded" style="width: 100%; max-width: 400px;">
        <h5 class="text-center mb-4">Registro de Usuario</h5>
        <form action="{{ url_for('formulario_registro') }}" method="post">
            <input type="text" class="form-control mb-3" name="nombre" placeholder="Nombre completo" required>
            <input type="email" class="form-control mb-3" name="correo" placeholder="Correo electrónico" required>
            <input type="tel" class="form-control mb-3" name="telefono" placeholder="Teléfono" required>
            <input type="password" class="form-control mb-3" name="clave" placeholder="Contraseña" required>
            <input type="password" class="form-control mb-3" name="confirmar_clave" placeholder="Confirmar contraseña" required>

            <div class="text-center">
                <button type="submit" class="btn custom-btn mb-3">Registrarse</button>
                <br>
                <a href="{{ url_for('home') }}" class="btn btn-secondary">Volver</a>
            </div>
        </form> 
    </div>  
</div>

{% endblock %}
