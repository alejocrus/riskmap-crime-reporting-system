<!-- llamar a layout -->
{% extends "layout.html" %}

{% block title %} Reporte {% endblock %}

{% include 'dashboard.html' %}
<!-- Contenido -->
{% block content %}
<div class="col-md-6 form-container">
    <h1>¡Gracias por contactarnos!</h1>
    <p class="info-suceso">Ingresa los siguientes datos</p>
    
    <form action="#" method="post">
      <label for="nombre">Nombre completo:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
  
      <label for="correo">Correo electrónico:</label>
      <input type="email" id="correo" name="email" placeholder="Email" required>
  
      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" name="mensaje" placeholder="Mensaje" rows="4" required></textarea>
  
      <button type="submit">Enviar</button>
    </form>
  </div>
  {% endblock %}
